variables:
- template: pipeline-templates/global-variables.yml

trigger:
  branches:
    include:
    - main
    - release-*
  tags:
    include:
    - '*'
  paths:
    exclude:
    - README.md
    - AGENTS.md

pr:
  branches:
    include:
    - main
    - release-*
  paths:
    exclude:
    - README.md
    - AGENTS.md

jobs:
# Job 1: PR Validation - runs only on pull requests
- job: PRValidation
  displayName: 'PR Validation: PySafeguard SDK'
  condition: eq(variables['Build.Reason'], 'PullRequest')

  pool:
    vmImage: ubuntu-latest

  steps:
  - template: pipeline-templates/build-steps.yml

# Job 2: Build and Publish - runs only on successful merges (not PRs)
- job: BuildAndPublish
  displayName: 'Build and publish PySafeguard SDK'
  condition: ne(variables['Build.Reason'], 'PullRequest')

  pool:
    vmImage: ubuntu-latest

  steps:
  - template: pipeline-templates/build-steps.yml

  # GitHub release for every merge build (dev builds are marked as prerelease)
  - task: GitHubRelease@1
    displayName: 'Publish GitHub release'
    inputs:
      gitHubConnection: 'PangaeaBuild-GitHub'
      repositoryName: 'OneIdentity/PySafeguard'
      action: 'create'
      target: '$(Build.SourceVersion)'
      tagSource: 'userSpecifiedTag'
      tag: '$(PackageVersion)'
      title: '$(PackageVersion)'
      isPreRelease: ${{ not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}
      changeLogCompareToRelease: 'lastFullRelease'
      changeLogType: 'commitBased'
      assets: $(Build.ArtifactStagingDirectory)/dist/*

  # PyPI publish only for tagged builds
  - script: |
      python -m pip install --upgrade twine
    displayName: 'Install twine'
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))

  # Set pythonUploadServiceConnection: testPypiTania if you want to test a PyPi push
  # but not actually push a project to PyPi OneIdentity. See Project Settings->Service Connections.
  - task: TwineAuthenticate@1
    displayName: 'Twine Authenticate'
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
    inputs:
      pythonUploadServiceConnection: pypiOneIdentity

  - script: |
      twine upload --verbose --config-file $(PYPIRC_PATH) dist/*
    displayName: 'Upload release to PyPI'
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))